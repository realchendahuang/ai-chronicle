name = "ai-chronicle-proxy"
main = "worker/index.js"
compatibility_date = "2026-07-10"

[observability]
enabled = true
head_sampling_rate = 1

[[routes]]
pattern = "chendahuang.com/ai-chronicle"
zone_name = "chendahuang.com"

[[routes]]
pattern = "chendahuang.com/ai-chronicle/*"
zone_name = "chendahuang.com"
